<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5</title>

    <!-- tailwind and daisy ui -->
     <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- link css -->
     <link rel="stylesheet" href="./style.css">

</head>
<body class="">
    <main class="container mx-auto flex justify-center items-center">
        
        <div class="shadow-2xl bg-[#FFFFFF] w-[520px] mx-auto mt-[72px]">
            <div class="flex justify-center py-8">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="font-semibold text-[1.5rem] text-center text-[#000000]">GitHub Issues Tracker</h2>
            <p class="text-[1rem] text-center text-[#64748B]">Sign in to manage your issues</p>

            <div class="flex justify-center items-center ">
                <fieldset class="fieldset rounded-box w-full p-6">
                    

                    <label class="label text-[#1F2937]">Username</label>
                    <input id="input-number" type="email" class="input w-full" placeholder="Enter your Username" />
                    <p class="text-[0.8rem] text-[#4A00FF]">Default: admin</p>

                    <label class="label text-[#1F2937]">Password</label>
                    <input id="input-pin" type="password" class="input w-full" placeholder="Enter your Password" />
                    <p class="text-[0.8rem] text-[#4A00FF]">Default: admin123</p>

                    <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>

            <div class="flex items-center gap-3 p-6">
                <hr class="flex-1 border-gray-300">
                <span class="text-[#1F2937]">Or</span>
                <hr class="flex-1 border-gray-300">
            </div>

            <h2 class="text-[#64748B] text-center pb-2.5">Demo Credentials:</h2>
            <div class="p-6 shadow-2xl bg-[#64748b10] mx-5 mb-5">
                <h2 class="text-center text-[#1F2937]">Username: admin</h2>
                <h2 class="text-center text-[#1F2937]">Password: admin123</h2>
            </div>
        </div>
    </main>

    <script src="./script/script.js"></script>
</body>
</html>
