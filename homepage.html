  <body class="bg-[#E9E9E9]">
    <section class=" py-6 bg-[#F8FAFC] mb-16">
        <div class="flex justify-between items-center mx-20">
                    <div class="flex items-center gap-2.5">
                        <img class="w-10 h-10" src="./assets/github-logo.png" alt="" />
                        <h2 class="font-semibold text-[1.8rem]">GitHub Issues Tracker</h2>
                    </div>

            <div class="flex gap-3">
            <label class="input">
                <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                >
                <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </g>
                </svg>
                <input id="search-box" type="search" required placeholder="Search" />
            </label>

            <button id="search-btn" class="btn btn-primary text-[#FFFFFF]"><span><i class="fa-solid fa-plus"></i></span>Search</button>
            </div>
        </div>
    </section>

    <section class="container mx-auto bg-[#FFFFFF] p-6 shadow-2xl rounded-[10px] mb-4">
        <div>
            <button id="all-btn" class="btn btn-primary filter-btn w-[120px] h-10">All</button>
            <button id="open-btn" class="btn filter-btn w-[120px] h-10">Open</button>
            <button id="closed-btn" class="btn filter-btn w-[120px] h-10">Closed</button>
        </div>
    </section>

    <section class="container mx-auto bg-[#FFFFFF] rounded-[10px]">
        <div class=" p-5 shadow ">
            <div class="flex justify-between items-center">
            <div class="flex  items-center gap-3">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-[1.25rem] text-[#1F2937]">
                        <span id="total-issues-count">50</span> Issues
                    </h2>
                    
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            
            <div class="flex  items-center gap-3">
                <img src="./assets/Open-Status.png" alt="">
                <p class="font-medium">Open</p>
                <img src="./assets/Closed- Status .png" alt="">
                <p class="font-medium">Closed</p>
            </div>
        </div>
        </div>

        <!-- loading spinner -->

            <div id="loading-spinner" class="flex justify-center items-center">
                <div class="flex w-52 flex-col gap-4 m-3">
                <div class="skeleton h-32 w-full"></div>
                <div class="skeleton h-4 w-28"></div>
                <div class="skeleton h-4 w-full"></div>
                <div class="skeleton h-4 w-full"></div>
            </div>
            </div>
